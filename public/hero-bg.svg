<svg viewBox="0 0 1920 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Rich deep base: midnight navy to warm dark plum -->
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d0a1a"/>
      <stop offset="45%"  stop-color="#13082a"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>

    <!-- Central warm gold glow -->
    <radialGradient id="goldCore" cx="50%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#d97706" stop-opacity="0.42"/>
      <stop offset="60%"  stop-color="#b45309" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>

    <!-- Left accent glow: warm rose-gold -->
    <radialGradient id="roseLeft" cx="12%" cy="35%" r="32%">
      <stop offset="0%"   stop-color="#c2410c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>

    <!-- Right accent glow: deep amber -->
    <radialGradient id="amberRight" cx="88%" cy="25%" r="36%">
      <stop offset="0%"   stop-color="#d97706" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom glow: purple-rose -->
    <radialGradient id="purpleBot" cx="55%" cy="100%" r="45%">
      <stop offset="0%"   stop-color="#7e22ce" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold shimmer for decorative lines -->
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fef3c7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#fef3c7" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle gold for ornamental details -->
    <linearGradient id="goldAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- ── Base background ─────────────────────────────────────────────── -->
  <rect width="1920" height="620" fill="url(#base)"/>

  <!-- ── Ambient glows (no blur — radialGradient on full rects) ────── -->
  <rect width="1920" height="620" fill="url(#goldCore)"/>
  <rect width="1920" height="620" fill="url(#roseLeft)"/>
  <rect width="1920" height="620" fill="url(#amberRight)"/>
  <rect width="1920" height="620" fill="url(#purpleBot)"/>

  <!-- ── Art Deco ornamental frame lines ────────────────────────────── -->
  <!-- Top horizontal gold band -->
  <rect x="0" y="24" width="1920" height="1.5" fill="url(#goldLine)" opacity="0.55"/>
  <rect x="0" y="30" width="1920" height="0.7" fill="url(#goldLine)" opacity="0.3"/>
  <!-- Bottom horizontal gold band -->
  <rect x="0" y="590" width="1920" height="1.5" fill="url(#goldLine)" opacity="0.55"/>
  <rect x="0" y="584" width="1920" height="0.7" fill="url(#goldLine)" opacity="0.3"/>

  <!-- ── Art Deco corner diamonds (left) ────────────────────────────── -->
  <g opacity="0.55" fill="none" stroke="#fbbf24" stroke-width="1.2">
    <polygon points="120,60 150,90 120,120 90,90" />
    <polygon points="120,68 142,90 120,112 98,90" opacity="0.5"/>
    <line x1="70" y1="90" x2="88" y2="90" stroke-width="1"/>
    <line x1="152" y1="90" x2="170" y2="90" stroke-width="1"/>
    <line x1="120" y1="40" x2="120" y2="58" stroke-width="1"/>
    <line x1="120" y1="122" x2="120" y2="140" stroke-width="1"/>
  </g>
  <!-- ── Art Deco corner diamonds (right) ───────────────────────────── -->
  <g opacity="0.55" fill="none" stroke="#fbbf24" stroke-width="1.2">
    <polygon points="1800,60 1830,90 1800,120 1770,90" />
    <polygon points="1800,68 1822,90 1800,112 1778,90" opacity="0.5"/>
    <line x1="1750" y1="90" x2="1768" y2="90" stroke-width="1"/>
    <line x1="1832" y1="90" x2="1850" y2="90" stroke-width="1"/>
    <line x1="1800" y1="40" x2="1800" y2="58" stroke-width="1"/>
    <line x1="1800" y1="122" x2="1800" y2="140" stroke-width="1"/>
  </g>

  <!-- ── Vertical ornamental side pillars ───────────────────────────── -->
  <g opacity="0.22" stroke="#fbbf24" stroke-width="0.8" fill="none">
    <!-- Left pillar -->
    <line x1="220" y1="0" x2="220" y2="620"/>
    <line x1="224" y1="0" x2="224" y2="620"/>
    <line x1="218" y1="100" x2="226" y2="100"/>
    <line x1="218" y1="200" x2="226" y2="200"/>
    <line x1="218" y1="420" x2="226" y2="420"/>
    <line x1="218" y1="520" x2="226" y2="520"/>
    <!-- Right pillar -->
    <line x1="1696" y1="0" x2="1696" y2="620"/>
    <line x1="1700" y1="0" x2="1700" y2="620"/>
    <line x1="1694" y1="100" x2="1702" y2="100"/>
    <line x1="1694" y1="200" x2="1702" y2="200"/>
    <line x1="1694" y1="420" x2="1702" y2="420"/>
    <line x1="1694" y1="520" x2="1702" y2="520"/>
  </g>

  <!-- ── Central perfume bottle silhouette ──────────────────────────── -->
  <g opacity="0.28" fill="url(#goldAccent)">
    <!-- Bottle body — elegant tall oval -->
    <rect x="906" y="220" width="108" height="280" rx="54"/>
    <!-- Bottle shoulder -->
    <rect x="924" y="180" width="72" height="50" rx="18"/>
    <!-- Bottle neck -->
    <rect x="946" y="138" width="28" height="52" rx="10"/>
    <!-- Atomiser cap -->
    <rect x="940" y="108" width="40" height="36" rx="8"/>
    <!-- Cap finial -->
    <rect x="953" y="92" width="14" height="20" rx="7"/>
  </g>
  <!-- Bottle highlight stroke -->
  <g opacity="0.18" fill="none" stroke="#fef3c7" stroke-width="1.5">
    <rect x="906" y="220" width="108" height="280" rx="54"/>
    <rect x="924" y="180" width="72" height="50" rx="18"/>
  </g>

  <!-- ── Starburst / bokeh dots scattered ───────────────────────────── -->
  <g fill="#fbbf24">
    <circle cx="320"  cy="140" r="2.5" opacity="0.45"/>
    <circle cx="480"  cy="80"  r="1.5" opacity="0.3"/>
    <circle cx="680"  cy="200" r="2"   opacity="0.35"/>
    <circle cx="800"  cy="55"  r="1.8" opacity="0.28"/>
    <circle cx="1100" cy="80"  r="2.2" opacity="0.38"/>
    <circle cx="1280" cy="160" r="1.5" opacity="0.3"/>
    <circle cx="1450" cy="70"  r="2"   opacity="0.35"/>
    <circle cx="1620" cy="130" r="2.5" opacity="0.4"/>
    <circle cx="360"  cy="480" r="1.8" opacity="0.22"/>
    <circle cx="750"  cy="530" r="1.5" opacity="0.2"/>
    <circle cx="1560" cy="500" r="2"   opacity="0.25"/>
  </g>
  <!-- Tiny accent crosses -->
  <g stroke="#fbbf24" stroke-width="1" opacity="0.3">
    <line x1="555" y1="118" x2="565" y2="128"/><line x1="565" y1="118" x2="555" y2="128"/>
    <line x1="1380" y1="95"  x2="1390" y2="105"/><line x1="1390" y1="95"  x2="1380" y2="105"/>
    <line x1="860"  y1="540" x2="870" y2="550"/><line x1="870"  y1="540" x2="860" y2="550"/>
  </g>

  <!-- ── Flowing organic wave lines ─────────────────────────────────── -->
  <path d="M0 500 C280 420 560 460 880 490 C1120 510 1420 530 1920 460"
        stroke="#fef3c7" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/>
  <path d="M0 555 C360 470 760 510 1080 545 C1380 575 1640 565 1920 515"
        stroke="#fdba74" stroke-width="1"   stroke-linecap="round" fill="none" opacity="0.14"/>
  <path d="M0 440 C200 380 500 400 780 430 C1060 460 1360 400 1920 390"
        stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.12"/>

  <!-- ── Central Art Deco sunburst (behind bottle) ──────────────────── -->
  <g opacity="0.08" stroke="#fbbf24" stroke-width="0.8" fill="none">
    <line x1="960" y1="310" x2="960" y2="120"/>
    <line x1="960" y1="310" x2="960" y2="500"/>
    <line x1="960" y1="310" x2="780"  y2="200"/>
    <line x1="960" y1="310" x2="1140" y2="200"/>
    <line x1="960" y1="310" x2="780"  y2="420"/>
    <line x1="960" y1="310" x2="1140" y2="420"/>
    <line x1="960" y1="310" x2="740"  y2="310"/>
    <line x1="960" y1="310" x2="1180" y2="310"/>
    <line x1="960" y1="310" x2="820"  y2="165"/>
    <line x1="960" y1="310" x2="1100" y2="165"/>
    <line x1="960" y1="310" x2="820"  y2="455"/>
    <line x1="960" y1="310" x2="1100" y2="455"/>
  </g>
</svg>
